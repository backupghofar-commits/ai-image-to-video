<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to Video - Free Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' } } }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900/20 to-black min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-2xl mb-6">
                <i class="fas fa-sparkles text-2xl text-purple-400"></i>
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    AI Image to Video
                </h1>
            </div>
            <p class="text-gray-400 text-lg max-w-md mx-auto">Upload gambar + prompt → AI generate video otomatis!</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 items-start">
            <div class="space-y-6">
                <div class="bg-white/5 backdrop-blur-sm rounded-3xl p-8 border border-white/10">
                    <label class="block text-sm font-medium mb-4 text-gray-300 flex items-center">
                        <i class="fas fa-image mr-2"></i>Gambar (JPEG/PNG)
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" class="file-input">
                    <div id="imagePreview" class="mt-4 opacity-0 transition-all">
                        <img id="previewImg" class="max-w-full max-h-64 rounded-xl shadow-2xl" />
                    </div>
                </div>

                <div class="bg-white/5 backdrop-blur-sm rounded-3xl p-6 border border-white/10">
                    <label class="block text-sm font-medium mb-3 text-gray-300 flex items-center">
                        <i class="fas fa-magic mr-2 text-purple-400"></i>Prompt
                    </label>
                    <textarea id="promptInput" rows="4" placeholder="Contoh: 'sunset cinematic slow motion, wind blowing, 4k quality'" class="w-full textarea"></textarea>
                </div>

                <button id="generateBtn" class="generate-btn" disabled>
                    <i class="fas fa-rocket"></i> Generate Video AI
                </button>
            </div>

            <div id="resultSection" class="space-y-6 hidden">
                <div id="statusCard" class="status-card">
                    <div class="flex items-center gap-3 mb-4">
                        <div id="statusIcon" class="status-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div>
                            <div id="statusText" class="font-bold text-lg">Processing...</div>
                            <div id="statusDetail" class="text-sm text-gray-400">AI generating video</div>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>

                <div id="videoContainer" class="video-container hidden">
                    <video id="generatedVideo" controls class="generated-video"></video>
                    <div class="flex gap-3 mt-6 pt-6 border-t border-white/10">
                        <button id="downloadBtn" class="download-btn">
                            <i class="fas fa-download mr-2"></i>Download
                        </button>
                        <button id="newVideoBtn" class="new-video-btn">
                            <i class="fas fa-plus mr-2"></i>New Video
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="historySection" class="mt-16">
            <h3 class="history-title">📚 History</h3>
            <div id="historyList" class="history-grid"></div>
        </div>
    </div>

    <style>
        .file-input { @apply w-full h-64 border-2 border-dashed border-white/20 rounded-2xl p-8 text-center cursor-pointer hover:border-white/40 transition-all bg-white/5 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-gradient-to-r file:from-purple-500 file:to-pink-500 file:text-white hover:file:from-purple-600 hover:file:to-pink-600; }
        .textarea { @apply w-full bg-white/5 border border-white/20 rounded-2xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500/50 focus:ring-2 focus:ring-purple-500/30 resize-vertical transition-all; }
        .generate-btn { @apply w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-4 px-8
